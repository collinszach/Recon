# Production overlay for the Beelink NUC (zach@100.91.198.28).
#
# The app is reached **privately over Tailscale** (the iOS app talks to
# http://100.91.198.28:8010 directly), so Recon no longer runs a public
# Cloudflare Tunnel or Cloudflare Access. The old `cloudflared` sidecar was
# removed 2026-06-24 when we switched to Local/Tailscale-only.
#
# Ports are handled entirely by the base compose: it publishes only the API
# (`${API_PORT:-8000}`; the NUC's .env sets API_PORT=8010 since 8000 is taken)
# and keeps Postgres/Redis internal. So prod is now just the base compose —
# this overlay is intentionally empty and kept only so existing deploy commands
# (`-f docker-compose.yml -f docker-compose.prod.yml up -d`) keep working.
services: {}
