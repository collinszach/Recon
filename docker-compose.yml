services:
  db:
    image: pgvector/pgvector:pg16
    container_name: recon-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-recon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recon}
      POSTGRES_DB: ${POSTGRES_DB:-recon}
    volumes:
      - recon-pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recon}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: recon-redis
    command: ["redis-server", "--save", "60", "1", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build: ./api
    container_name: recon-api
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./web:/app/web:ro
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: recon-worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  recon-pgdata:
