services:
  db:
    image: pgvector/pgvector:pg16
    container_name: recon-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-recon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recon}
      POSTGRES_DB: ${POSTGRES_DB:-recon}
    volumes:
      - recon-pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    # No host port: api/worker reach Postgres by service name on the compose
    # network. Avoids clashing with other Postgres instances on a shared host.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recon}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: recon-redis
    command: ["redis-server", "--save", "60", "1", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    # No host port (internal only) — avoids clashing with other Redis on the host.
    restart: unless-stopped

  api:
    build: ./api
    container_name: recon-api
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    # Host port is env-gated so even a bare `docker compose up` (without the prod
    # overlay) lands on the right port. The NUC sets API_PORT=8010 in .env
    # (8000 is taken there); local dev defaults to 8000.
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./web:/app/web:ro
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: recon-worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  recon-pgdata:
